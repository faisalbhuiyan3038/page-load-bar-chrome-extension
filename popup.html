<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <form>
        <div class="setting-row">
            <label for="color">Color:</label>
            <input type="color" id="color">
        </div>
        <div class="setting-row">
            <label for="isRainbow">Rainbow:</label>
            <input type="checkbox" id="isRainbow">
        </div>
        <div class="setting-row range-row">
            <label for="rainbow_size">Rainbow Size:</label>
            <input type="range" id="rainbow_size" min="0.1" max="5" step="0.01">
        </div>
        <div class="setting-row range-row">
            <label for="width">Thickness:</label>
            <input type="range" id="width" min="1" max="30" step="1">
        </div>
        <div class="setting-row range-row">
            <label for="opacity">Opacity:</label>
            <input type="range" id="opacity" min="0.25" max="1" step="0.05">
        </div>
        <div class="setting-row">
            <label for="place">Position:</label>
            <select id="place">
                <option value="top">Top</option>
                <option value="bottom">Bottom</option>
            </select>
        </div>
        <div class="setting-row">
            <label for="smooth">Smooth:</label>
            <select id="smooth">
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>
        <div class="setting-row">
            <label for="showCounter">Show Counter:</label>
            <input type="checkbox" id="showCounter">
        </div>
    </form>
    
    <div class="footer">
        <a href="#" id="open-options">Open Full Options Page</a>
    </div>

    <script src="popup.js"></script>
</body>
</html>
